<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabuada</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #dbeafe, #eff6ff);
        min-height: 100vh;
      }
      .pagina {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 24px;
        box-sizing: border-box;
      }
      .caixa {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
        width: 520px;
        max-width: 100%;
      }
      h1 {
        color: #1d4ed8;
        margin: 0 0 10px;
      }
      p {
        color: #475569;
      }
      input {
        width: 300px;
        max-width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 15px;
        box-sizing: border-box;
        outline: none;
      }
      button {
        display: block;
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        margin: 15px auto 0;
        width: 200px;
        max-width: 100%;
      }
      button:hover {
        background: #1e40af;
      }
      .erro {
        margin: 16px 0 0;
        padding: 10px;
        background: #fff2f2;
        border: 1px solid #ffd6d6;
        border-radius: 8px;
        color: #a40000;
        text-align: left;
      }
      .bloco {
        margin-top: 14px;
        padding: 12px;
        background: #fafafa;
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        text-align: left;
      }
      .bloco h2 {
        margin: 0 0 8px;
        font-size: 14px;
        color: #1d4ed8;
      }
      ul {
        margin: 0;
        padding-left: 18px;
      }
      li {
        margin: 6px 0;
      }
      .eq {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      footer {
        margin-top: 20px;
        text-align: center;
        color: #475569;
        font-size: 14px;
      }
      footer a {
        color: #1d4ed8;
        text-decoration: none;
        font-weight: bold;
      }
      @media (max-width: 560px) {
        .caixa {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="pagina">
      <div class="caixa">
        <h1>Tabuada</h1>
        <p>Digite um número inteiro para gerar a tabuada (for) e os pares (while).</p>

        <form id="form">
          <input id="n" name="n" type="number" placeholder="Digite um número inteiro" inputmode="numeric" required />
          <button type="submit">Gerar</button>
        </form>

        <p id="error" class="erro" role="alert" hidden></p>

        <div class="bloco">
          <h2>Tabuada (for)</h2>
          <ul id="tabuada-list"></ul>
        </div>
        <div class="bloco">
          <h2>Pares (while)</h2>
          <ul id="pares-list"></ul>
        </div>

        <noscript>
          <p class="erro">Ative o JavaScript para gerar a tabuada.</p>
        </noscript>
      </div>

      <footer>
        Desenvolvido por
        <a href="https://ellsouza.github.io/ellen-portfolio/" target="_blank" rel="noopener noreferrer">Ellen Souza</a>
      </footer>
    </div>

    <script>
      const input = document.querySelector("#n");
      const form = document.querySelector("#form");
      const errorEl = document.querySelector("#error");
      const tabuadaList = document.querySelector("#tabuada-list");
      const paresList = document.querySelector("#pares-list");

      const setError = (message) => {
        if (!message) {
          errorEl.hidden = true;
          errorEl.textContent = "";
          return;
        }
        errorEl.hidden = false;
        errorEl.textContent = message;
      };

      const clearLists = () => {
        tabuadaList.innerHTML = "";
        paresList.innerHTML = "";
      };

      const render = (n) => {
        clearLists();
        if (n === null) return;

        for (let i = 1; i <= 10; i += 1) {
          const li = document.createElement("li");
          li.innerHTML = `<span class="eq">${n} x ${i} =</span> <strong>${n * i}</strong>`;
          tabuadaList.appendChild(li);
        }

        let contador = 1;
        while (contador <= 10) {
          const li = document.createElement("li");
          li.innerHTML = `<span class="eq">contador=${contador} →</span> <strong>${contador * 2}</strong>`;
          paresList.appendChild(li);
          contador += 1;
        }
      };

      const parseIntStrict = (value) => {
        if (typeof value !== "string") return null;
        const trimmed = value.trim();
        if (!trimmed) return null;
        if (!/^-?\\d+$/.test(trimmed)) return Number.NaN;
        return Number.parseInt(trimmed, 10);
      };

      const loadFromUrl = () => {
        const params = new URLSearchParams(window.location.search);
        const nRaw = params.get("n");
        if (!nRaw) {
          render(null);
          return;
        }
        input.value = nRaw;
        const nParsed = parseIntStrict(nRaw);
        if (!Number.isInteger(nParsed)) {
          setError("Digite um número inteiro válido.");
          render(null);
          return;
        }
        setError("");
        render(nParsed);
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const nRaw = String(input.value);
        const nParsed = parseIntStrict(nRaw);
        if (!Number.isInteger(nParsed)) {
          setError("Digite um número inteiro válido.");
          render(null);
          return;
        }
        setError("");
        const url = new URL(window.location.href);
        url.searchParams.set("n", String(nParsed));
        window.history.replaceState({}, "", url);
        render(nParsed);
      });

      loadFromUrl();
    </script>
  </body>
</html>
